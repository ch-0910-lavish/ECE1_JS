<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation and Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="main-heading">Welcome to DOM Manipulation</h1>
    <p id="main-paragraph">This is a sample paragraph that can be shown or hidden.</p>

    <input type="text" id="text-input" placeholder="Enter new heading text">

    <div class="button-container">
        <button id="change-heading">Change Heading</button>
        <button id="change-bg">Change Background Color</button>
        <button id="increase-font">Increase Font Size</button>
        <button id="toggle-paragraph">Show/Hide Paragraph</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
